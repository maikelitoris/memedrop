name: memedrop
description: "A minimalist Flutter mobile app where users receive two time-gated meme drops daily."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.0
  flutter_cache_manager: ^3.3.1
  intl: ^0.19.0
  flutter_riverpod: ^2.5.1
  uuid: ^4.4.0
  path_provider: ^2.1.2
  flutter_staggered_grid_view: ^0.7.0
  gal: ^2.3.0
  model_viewer_plus: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/memes/manifest.json
    - assets/memes/legendary/
    - assets/memes/epic/
    - assets/memes/rare/
    - assets/memes/common/
    - assets/memes/Common/
    - assets/memes/Rare/
    - assets/memes/Epic/
    - assets/memes/Legendary/
